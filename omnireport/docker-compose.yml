version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quotedme
      POSTGRES_PASSWORD: quotedme_password
      POSTGRES_DB: quotedme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quotedme"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://quotedme:quotedme_password@postgres:5432/quotedme
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
      BYPASS_LEMONSQUEEZY: ${BYPASS_LEMONSQUEEZY:-false}
      LEMONSQUEEZY_API_KEY: ${LEMONSQUEEZY_API_KEY}
      LEMONSQUEEZY_STORE_ID: ${LEMONSQUEEZY_STORE_ID}
      LEMONSQUEEZY_WEBHOOK_SECRET: ${LEMONSQUEEZY_WEBHOOK_SECRET}
      NEXT_PUBLIC_VARIANT_ID_STARTER: ${NEXT_PUBLIC_VARIANT_ID_STARTER}
      NEXT_PUBLIC_VARIANT_ID_PRO: ${NEXT_PUBLIC_VARIANT_ID_PRO}
      NEXT_PUBLIC_VARIANT_ID_BUSINESS: ${NEXT_PUBLIC_VARIANT_ID_BUSINESS}
      NEXT_PUBLIC_VARIANT_ID_ENTERPRISE: ${NEXT_PUBLIC_VARIANT_ID_ENTERPRISE}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL}
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql://quotedme:quotedme_password@postgres:5432/quotedme
      REDIS_URL: redis://redis:6379
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_BYPASS_LEMONSQUEEZY: ${NEXT_PUBLIC_BYPASS_LEMONSQUEEZY:-false}
        NEXT_PUBLIC_VARIANT_ID_STARTER: ${NEXT_PUBLIC_VARIANT_ID_STARTER}
        NEXT_PUBLIC_VARIANT_ID_PRO: ${NEXT_PUBLIC_VARIANT_ID_PRO}
        NEXT_PUBLIC_VARIANT_ID_BUSINESS: ${NEXT_PUBLIC_VARIANT_ID_BUSINESS}
        NEXT_PUBLIC_VARIANT_ID_ENTERPRISE: ${NEXT_PUBLIC_VARIANT_ID_ENTERPRISE}
        NEXT_PUBLIC_VARIANT_ID_CREDITS_10: ${NEXT_PUBLIC_VARIANT_ID_CREDITS_10}
        NEXT_PUBLIC_VARIANT_ID_CREDITS_50: ${NEXT_PUBLIC_VARIANT_ID_CREDITS_50}
        NEXT_PUBLIC_VARIANT_ID_CREDITS_100: ${NEXT_PUBLIC_VARIANT_ID_CREDITS_100}
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: ""
      API_PROXY_URL: http://api:3000
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      NEXT_PUBLIC_BYPASS_LEMONSQUEEZY: ${NEXT_PUBLIC_BYPASS_LEMONSQUEEZY:-false}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
