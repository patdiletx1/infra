services:
  ctrlz-backend:
    build: ./ctrlz-backend
    ports:
      - "5000:5000"
    env_file: .env
    restart: unless-stopped
    volumes:
      - ctrlz_data:/app/data

  ctrlz-dashboard:
    build:
      context: ./ctrlz-dashboard
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - "5002:80"
    restart: unless-stopped

volumes:
  ctrlz_data:
